# Cost-optimized preset — maximize throughput with cost awareness
optimization:
  preset: cost_optimized
  objectives:
    - metric: output_tokens_per_sec
      direction: maximize
      weight: 1.0
  sampler: tpe
  n_trials: 30
  max_concurrent_trials: 1
  n_startup_trials: 8

# Recommended parameter search space for cost-optimized tuning
parameters:
  - name: gpu_memory_utilization
    min: 0.85
    max: 0.95
    step: 0.05
  - name: max_num_seqs
    min: 32
    max: 512
    step: 32
  - name: max_num_batched_tokens
    min: 1024
    max: 8192
    step: 1024
  - name: enable_chunked_prefill
    options: ["true", "false"]
  - name: enable_prefix_caching
    options: ["true", "false"]
  - name: kv_cache_dtype
    options: ["auto", "fp8"]
  - name: block_size
    options: ["16", "32"]
