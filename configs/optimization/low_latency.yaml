optimization:
  preset: low_latency
  objectives:
    - metric: p95_latency_ms
      direction: minimize
      weight: 1.0
  sampler: tpe
  n_trials: 50
  max_concurrent_trials: 1
  n_startup_trials: 10

# Recommended parameter search space for low latency
parameters:
  - name: gpu_memory_utilization
    min: 0.80
    max: 0.95
    step: 0.05
  - name: max_num_seqs
    min: 8
    max: 128
    step: 8
  - name: max_num_batched_tokens
    min: 512
    max: 4096
    step: 512
  - name: enable_chunked_prefill
    options: ["true", "false"]
  - name: enable_prefix_caching
    options: ["true", "false"]
  - name: kv_cache_dtype
    options: ["auto", "fp8"]
  - name: block_size
    options: ["16", "32"]
  - name: swap_space
    min: 2
    max: 8
    step: 2
