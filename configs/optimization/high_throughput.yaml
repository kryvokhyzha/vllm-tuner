optimization:
  preset: high_throughput
  objectives:
    - metric: output_tokens_per_sec
      direction: maximize
      weight: 1.0
  sampler: tpe
  n_trials: 50
  max_concurrent_trials: 1
  n_startup_trials: 10

# Recommended parameter search space for high throughput
parameters:
  - name: gpu_memory_utilization
    min: 0.80
    max: 0.95
    step: 0.05
  - name: max_num_seqs
    min: 64
    max: 1024
    step: 64
  - name: max_num_batched_tokens
    min: 2048
    max: 16384
    step: 1024
  - name: enable_chunked_prefill
    options: ["true", "false"]
  - name: enable_prefix_caching
    options: ["true", "false"]
  - name: kv_cache_dtype
    options: ["auto", "fp8"]
  - name: block_size
    options: ["16", "32"]
  - name: swap_space
    min: 2
    max: 8
    step: 2
# ── vLLM 0.17.1 parameters ──
