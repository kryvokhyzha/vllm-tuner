# High-throughput tuning — single GPU
# Usage: python -m vllm_tuner.cli.main run --config configs/high_throughput_gpu.yaml
model: "meta-llama/Llama-3-8B-Instruct"

study:
  name: high-throughput-study

optimization:
  preset: high_throughput
  objectives:
    - metric: output_tokens_per_sec
      direction: maximize
      weight: 1.0
  sampler: tpe
  n_trials: 50
  n_startup_trials: 10

hardware:
  accelerator: gpu
  device_ids: [0]

parameters:
  - name: gpu_memory_utilization
    min: 0.5
    max: 0.95
    step: 0.05
  - name: max_num_seqs
    min: 32
    max: 512
    step: 32
  - name: max_num_batched_tokens
    min: 512
    max: 8192
    step: 256

static_parameters:
  dtype: auto
  max_model_len: 4096
  tensor_parallel_size: 1

benchmark:
  provider: guidellm
  prompt_tokens: 1500
  output_tokens: 200
  max_seconds: 300
  concurrent_requests: 50
  warmup_requests: 10

baseline:
  enabled: true
  num_requests: 50

# cost:
#   target_throughput: 100
#   instance_type: "a2-highgpu-1g"
#   price_per_hour: 3.67

output:
  directory: "./results"
  reports: ["html", "json", "yaml"]
  export_helm_values: true
