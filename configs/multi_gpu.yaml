# Multi-GPU tuning with tensor parallelism
# Usage: python -m vllm_tuner.cli.main run --config configs/multi_gpu.yaml
model: "meta-llama/Llama-3-70B-Instruct"

study:
  name: multi-gpu-study

optimization:
  preset: high_throughput
  objectives:
    - metric: output_tokens_per_sec
      direction: maximize
      weight: 1.0
  sampler: tpe
  n_trials: 30
  n_startup_trials: 8

hardware:
  accelerator: gpu
  device_ids: [0, 1, 2, 3]

parameters:
  - name: gpu_memory_utilization
    min: 0.5
    max: 0.95
    step: 0.05
  - name: max_num_seqs
    min: 64
    max: 1024
    step: 64
  - name: max_num_batched_tokens
    min: 8192
    max: 32768
    step: 2048
  - name: enable_chunked_prefill
    options: ["true", "false"]
  - name: enable_prefix_caching
    options: ["true", "false"]
  - name: block_size
    options: ["16", "32"]
  - name: swap_space
    min: 0
    max: 8
    step: 2

static_parameters:
  dtype: auto
  max_model_len: 8192
  kv_cache_dtype: auto
  tensor_parallel_size: 4
  data_parallel_size: 1

benchmark:
  provider: guidellm
  prompt_tokens: 1500
  output_tokens: 200
  max_seconds: 300
  concurrent_requests: 64
  warmup_requests: 10

baseline:
  enabled: true
  num_requests: 50

# cost:
#   target_throughput: 100
#   instance_type: "a2-highgpu-1g"
#   price_per_hour: 3.67

output:
  directory: "./results"
  reports: ["html", "json", "yaml"]
  export_helm_values: true
