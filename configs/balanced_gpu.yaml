# Balanced tuning (throughput + latency) — single GPU
# Usage: python -m vllm_tuner.cli.main run --config configs/balanced_gpu.yaml
model: "meta-llama/Llama-3-8B-Instruct"

study:
  name: balanced-study

optimization:
  preset: balanced
  objectives:
    - metric: output_tokens_per_sec
      direction: maximize
      weight: 0.6
    - metric: p95_latency_ms
      direction: minimize
      weight: 0.4
  sampler: nsga2
  n_trials: 75
  n_startup_trials: 15

hardware:
  accelerator: gpu
  device_ids: [0]

parameters:
  - name: gpu_memory_utilization
    min: 0.5
    max: 0.95
    step: 0.05
  - name: max_num_seqs
    min: 32
    max: 512
    step: 32

static_parameters:
  dtype: auto
  max_model_len: 4096
  tensor_parallel_size: 1

benchmark:
  provider: guidellm
  prompt_tokens: 1024
  output_tokens: 200
  max_seconds: 300
  concurrent_requests: 32
  warmup_requests: 10

baseline:
  enabled: true
  num_requests: 50

# cost:
#   target_throughput: 100
#   instance_type: "a2-highgpu-1g"
#   price_per_hour: 3.67

output:
  directory: "./results"
  reports: ["html", "json", "yaml"]
